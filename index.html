<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Квиз-календарь</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Google Sans is not publicly served by Google Fonts; Roboto is the live fallback.
     Drop real Google Sans .woff2 files into /fonts and add an @font-face for an exact match. -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <p class="eyebrow">Доступ по приглашению</p>
    <h1>Квиз-календарь</h1>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Пароль</label>
      <input type="password" id="password" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="login-btn">Войти</button>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="top">
    <div class="brand">
      <p class="eyebrow">Онлайн-квизы</p>
      <h1>Квиз-календарь</h1>
    </div>
    <button id="signout">Выйти</button>
  </header>

  <div class="month-nav">
    <button class="nav-btn" id="prev-month" aria-label="Предыдущий месяц">‹</button>
    <h2 id="month-label"></h2>
    <button class="nav-btn" id="next-month" aria-label="Следующий месяц">›</button>
  </div>

  <div class="weeks" id="weeks"></div>

  <div class="legend">
    <span><span class="dot"></span> Запланирован квиз</span>
    <span>Квизы — четверги и последняя пятница месяца</span>
  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <button class="close-x" id="modal-close" aria-label="Закрыть">✕</button>
    <p class="eyebrow" id="modal-date-label"></p>
    <h3 id="modal-heading">Новый квиз</h3>

    <div class="field">
      <label for="f-number">Номер выпуска</label>
      <input type="text" id="f-number" placeholder="например, 42">
    </div>
    <div class="field">
      <label for="f-title">Название</label>
      <input type="text" id="f-title" placeholder="например, Квиз 90-х">
    </div>
    <div class="field">
      <label for="f-platform">Платформа</label>
      <input type="text" id="f-platform" placeholder="например, Zoom, Discord">
    </div>
    <div class="field">
      <label for="f-details">Уточнения</label>
      <textarea id="f-details" rows="3" placeholder="любые детали"></textarea>
    </div>
    <div class="field">
      <label>Цвет</label>
      <div class="swatches" id="swatches"></div>
    </div>

    <p class="save-status" id="save-status"></p>

    <div class="modal-footer">
      <button class="btn-danger" id="delete-btn" style="display:none;">Удалить</button>
      <div class="modal-actions">
        <button class="btn-secondary" id="cancel-btn">Отмена</button>
        <button class="btn-primary" id="save-btn">Сохранить</button>
      </div>
    </div>
  </div>
</div>

<div id="version-tag"></div>

<script src="supabase.js"></script>
<script src="app.js"></script>
</body>
</html>
